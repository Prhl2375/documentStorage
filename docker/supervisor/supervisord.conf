[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:octane]
process_name=%(program_name)s
command=php /var/www/artisan octane:start --server=swoole --host=0.0.0.0 --port=8000 --workers=4 --task-workers=6 --max-requests=1000
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/log/supervisor/octane.log
stopwaitsecs=30

[program:queue-worker]
process_name=%(program_name)s_%(process_num)02d
command=/bin/sh -c "php /var/www/artisan rabbitmq:declare-queues && exec php /var/www/artisan queue:work rabbitmq --sleep=3 --tries=3 --timeout=90"
autostart=true
autorestart=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/log/supervisor/queue-worker.log
stopwaitsecs=3600

[program:scheduler]
process_name=%(program_name)s
command=/bin/sh -c "while true; do php /var/www/artisan schedule:run --no-interaction >> /var/log/supervisor/scheduler.log 2>&1; sleep 60; done"
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/log/supervisor/scheduler.log
