services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: file_storage_app
    restart: unless-stopped
    working_dir: /var/www
    ports:
      - "${APP_PORT:-80}:8000"
    volumes:
      - .:/var/www
      - /var/www/vendor
      - ./docker/supervisor/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_URL=${APP_URL:-http://localhost}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-file_storage}
      - DB_USERNAME=${DB_USERNAME:-laravel}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - QUEUE_CONNECTION=rabbitmq
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - RABBITMQ_VHOST=${RABBITMQ_VHOST:-/}
      - NOTIFICATION_EMAIL=${NOTIFICATION_EMAIL:-admin@example.com}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - file_storage_network

  postgres:
    image: postgres:16-alpine
    container_name: file_storage_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-file_storage}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_FORWARD_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-laravel} -d ${DB_DATABASE:-file_storage}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - file_storage_network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: file_storage_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_FORWARD_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - file_storage_network

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  file_storage_network:
    driver: bridge
